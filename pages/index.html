<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>PetCare</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="icon" type="image/png" href="../assets/Logo.png" />
    <script src="../scripts/theme.js" defer></script>
    <script src="../scripts/index.js" defer></script>
  </head>
  <body class="page">
    <div class="top-bar">
      <img class="logo" src="../assets/Logo.svg" alt="LOGO">
      <h1 class="header-title"> PetCare </h1>

        </div>

      <div id="pets-container"></div>

      <div class="card">
        <a class="add-card" href="newPet.html"> 
          <img class="add-card-image" src="../assets/Add.svg" alt="Add" />
          <h2 class="add-card-title" >Adicionar Pet</h2>
        </a>
      </div>

      <div id="popup-shadow" class="popup-shadow hidden">
          <div id="popup" class="popup settings hidden">
            <button id="closePopup" class="small-button button-contrast">
              <img class="plus close" src="../assets/Add.svg" alt="Add" />
            </button>

             <h2 class="sub-title">Configurações</h2>

             <div class="field"> 
                <h2 class="item-title">Tema Claro / Escuro</h2>
                <button class="small-button long-button button-contrast" id="toggle2"> 
                  <svg xmlns="http://www.w3.org/2000/svg" height="60px" viewBox="0 -1120 960 960" width="60px" fill="var(--text)"><path d="M480-28 346-160H160v-186L28-480l132-134v-186h186l134-132 134 132h186v186l132 134-132 134v186H614L480-28Zm0-252q83 0 141.5-58.5T680-480q0-83-58.5-141.5T480-680v400Zm0 140 100-100h140v-140l100-100-100-100v-140H580L480-820 380-720H240v140L140-480l100 100v140h140l100 100Zm0-340Z"/></svg>

             </div>

             <div class="field"> 
                <h2 class="item-title">Cores</h2>
                <p class="item-text">Apenas o tema de cores padrão está disponível atualmente.</p>
             </div>
             <div class="field"> 
              <h2 class="item-title" id="popupTitle">Exculir todos os pets</h2>

              <button id="deleteALL" class="small-button button-contrast long-button deleteALL">
                <svg class="trash" xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -1020 960 960" width="20px" fill="var(--shine)"><path d="m376-300 104-104 104 104 56-56-104-104 104-104-56-56-104 104-104-104-56 56 104 104-104 104 56 56Zm-96 180q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520Zm-400 0v520-520Z"/></svg>
                APAGAR TODOS OS DADOS
              </button>
            </div>

            <div class="field">
              <p class="center"> PetCare - Naomi Marra - ADS 2026 </p>
            </div>

          </div>
        </div>

    </section>
